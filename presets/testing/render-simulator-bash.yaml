name: testing/render-simulator-bash
title: Render Simulator (Bash)
description: A no-op render that sleeps per frame. Runs a bash script; use on Linux/macOS or any worker with a bash shell.
category: Testing
version: 1.0.0
template:
  specificationVersion: jobtemplate-2023-09
  name: render simulator
  parameterDefinitions:
    - name: FrameRange
      type: STRING
      default: 1-50
      userInterface:
        control: LINE_EDIT
        label: Frame Range
        groupLabel: Frames
    - name: SleepSeconds
      type: INT
      default: 30
      minValue: 1
      userInterface:
        control: SPIN_BOX
        label: Sleep (seconds)
        groupLabel: Render
  steps:
    - name: render
      parameterSpace:
        taskParameterDefinitions:
          - name: Frame
            type: INT
            range: "{{Param.FrameRange}}"
      script:
        embeddedFiles:
          - name: main
            type: TEXT
            runnable: true
            data: |
              #!/usr/bin/env bash
              set -euo pipefail
              echo "$(date +"%Y-%m-%d %H:%M:%S"): {{Task.Param.Frame}}"
              sleep {{Param.SleepSeconds}}
              echo "$(date +"%Y-%m-%d %H:%M:%S"): done"
        actions:
          onRun:
            command: "{{Task.File.main}}"
  extensions:
    - SQI_PATH_TRANSLATION
  SQI_PATH_TRANSLATION:
    deliveries:
      - stage_locally
