name: testing/render-simulator-powershell
title: Render Simulator (PowerShell)
description: A no-op render that sleeps per frame. Runs a PowerShell script; for Windows workers without a bash shell.
category: Testing
version: 1.0.0
template:
  specificationVersion: jobtemplate-2023-09
  name: render simulator
  parameterDefinitions:
    - name: FrameRange
      type: STRING
      default: 1-50
      userInterface:
        control: LINE_EDIT
        label: Frame Range
        groupLabel: Frames
    - name: SleepSeconds
      type: INT
      default: 30
      minValue: 1
      userInterface:
        control: SPIN_BOX
        label: Sleep (seconds)
        groupLabel: Render
  steps:
    - name: render
      parameterSpace:
        taskParameterDefinitions:
          - name: Frame
            type: INT
            range: "{{Param.FrameRange}}"
      script:
        embeddedFiles:
          - name: main
            filename: render.ps1
            type: TEXT
            data: |
              $ErrorActionPreference = 'Stop'
              Write-Output ("{0}: {1}" -f (Get-Date -Format 'yyyy-MM-dd HH:mm:ss'), '{{Task.Param.Frame}}')
              Start-Sleep -Seconds {{Param.SleepSeconds}}
              Write-Output ("{0}: done" -f (Get-Date -Format 'yyyy-MM-dd HH:mm:ss'))
        actions:
          onRun:
            command: powershell
            args:
              - "-NoProfile"
              - "-ExecutionPolicy"
              - "Unrestricted"
              - "-File"
              - "{{Task.File.main}}"
  extensions:
    - SQI_PATH_TRANSLATION
  SQI_PATH_TRANSLATION:
    deliveries:
      - stage_locally
