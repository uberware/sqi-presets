name: maya-scene-render
title: Maya Scene Render
description: >-
  Renders a saved Maya scene's renderable layers (whatever the scene's render
  settings mark renderable), one frame per task by default; raise the task
  chunk size to batch multiple frames per Render launch. Requires workers
  tagged maya=true with Render on PATH. For a single render layer use
  maya-layer-render. A starting point - duplicate to customize for your
  pipeline.
category: Rendering
version: 1.0.0
template:
  specificationVersion: jobtemplate-2023-09
  name: Maya Scene Render
  extensions: [TASK_CHUNKING, SQI_CHUNK_BOUNDS]
  parameterDefinitions:
    - name: SceneFile
      type: PATH
      objectType: FILE
      dataFlow: IN
      userInterface: { control: LINE_EDIT, label: Scene File }
    - name: Frames
      type: STRING
      userInterface: { control: LINE_EDIT, label: Frame Range }
    - name: OutputDir
      type: PATH
      objectType: DIRECTORY
      dataFlow: OUT
      userInterface: { control: LINE_EDIT, label: Output Directory }
    - name: Renderer
      type: STRING
      default: file
      userInterface: { control: LINE_EDIT, label: Renderer }
  steps:
    - name: Render
      hostRequirements:
        attributes:
          - name: attr.worker.tag.maya
            anyOf: ["true"]
      parameterSpace:
        taskParameterDefinitions:
          - name: Frame
            type: CHUNK[INT]
            range: "{{Param.Frames}}"
            chunks:
              defaultTaskCount: 1
              rangeConstraint: CONTIGUOUS
      script:
        actions:
          onRun:
            command: Render
            args:
              - "-r"
              - "{{Param.Renderer}}"
              - "-s"
              - "{{Task.Param.Frame.Start}}"
              - "-e"
              - "{{Task.Param.Frame.End}}"
              - "-rd"
              - "{{Param.OutputDir}}"
              - "{{Param.SceneFile}}"
